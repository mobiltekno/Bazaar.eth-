<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bazaar.eth | Farcaster Marketplace</title>
  
  <!-- Farcaster v2 Meta -->
  <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://bazaar-eth.netlify.app/preview.png","button":{"title":"🛍️ Open Bazaar","action":{"type":"launch_frame","name":"Bazaar.eth","url":"https://bazaar-eth.netlify.app","splashImageUrl":"https://bazaar-eth.netlify.app/icon.png","splashBackgroundColor":"#7C3AED"}}}' />
  
  <style>
    :root {
      --primary: #7C3AED;
      --primary-glow: #7C3AED55;
      --secondary: #0052FF;
      --bg: #0F172A;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #F8FAFC;
      --text-dim: #94A3B8;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    #app { display: flex; flex-direction: column; min-height: 100vh; max-width: 440px; margin: 0 auto; position: relative; border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border); background: radial-gradient(circle at top right, #1E1B4B, var(--bg)); padding-bottom: 80px; }
    .header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(12px); background: rgba(15, 23, 42, 0.8); z-index: 100; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; }
    .logo { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; color: #fff; }
    .logo span { color: var(--secondary); }
    .hero { padding: 40px 20px 24px; }
    .hero h1 { font-family: 'Outfit', sans-serif; font-size: 2rem; line-height: 1.1; margin-bottom: 8px; }
    .hero h1 span { background: linear-gradient(to right, #60A5FA, var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: var(--text-dim); font-size: 0.9rem; }
    .view { display: none !important; flex-direction: column; animation: fadeIn 0.3s ease; width: 100%; }
    .view.active { display: flex !important; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 440px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
    .nav-item { background: none; border: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem; cursor: pointer; transition: 0.2s; }
    .nav-item.active { color: var(--primary); }
    .nav-item span { font-weight: 600; }
    .product-grid { display: grid; grid-template-columns: 1fr; gap: 16px; padding: 0 20px; }
    .product-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); display: flex; flex-direction: column; position: relative; }
    .product-img { height: 160px; background-size: cover; background-repeat: no-repeat; background-position: center; margin: 8px; border-radius: 12px; position: relative; }
    .price-tag { position: absolute; top: 8px; right: 8px; background: rgba(124, 58, 237, 0.9); backdrop-filter: blur(8px); padding: 5px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; color: #fff; }
    .product-info { padding: 16px; }
    .seller-line { display: flex; justify-content: space-between; align-items: center; }
    .trust-mini { font-size: 0.65rem; color: #10B981; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 3px 8px; border-radius: 6px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .neynar-score { color: #6366F1; font-weight: 700; }
    .bazaar-form { padding: 0 20px; display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group input, .form-group select { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px 16px; border-radius: 12px; color: white; outline: none; }
    .submit-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; }
    .categories { display: flex; gap: 12px; padding: 0 20px 16px; overflow-x: auto; scrollbar-width: none; }
    .categories button { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 8px 16px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; }
    .categories button.active { background: var(--primary); color: white; }
    .card-actions { position: absolute; top: 8px; left: 8px; display: flex; gap: 4px; }
    .action-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1); color: white; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; }
    .action-btn.active { background: var(--primary); }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">Bazaar<span>.eth</span></div>
      <div class="user-badge" id="trust-badge">
        <span class="pulse"></span>
        <span id="score-text">FID Score: --</span>
      </div>
    </header>

    <!-- Dynamic Views -->
    <main id="main-content">
      <!-- Explore View -->
      <section id="view-explore" class="view active">
        <section class="hero">
          <h1>Social Commerce on <span>Base</span></h1>
          <p>Buy Knowing Who to Trust.</p>
        </section>
        <nav class="categories">
          <button class="active">All</button>
          <button>Digital</button>
          <button>Services</button>
        </nav>
        <div class="product-grid" id="product-list"></div>
      </section>

      <!-- Sell View -->
      <section id="view-sell" class="view">
        <div class="view-header">
          <h2>Sell Product</h2>
          <p>List your items on the social graph.</p>
        </div>
        <form id="sell-form" class="bazaar-form">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="in-name" placeholder="e.g. Ultra Rare NFT" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Price (ETH/DEGEN)</label>
              <input type="text" id="in-price" placeholder="0.05" required>
            </div>
            <div class="form-group">
              <label>Token</label>
              <select id="in-token">
                <option value="ETH">ETH</option>
                <option value="DEGEN">DEGEN</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="in-img" placeholder="https://..." required>
          </div>
          <div class="form-divider"><span>Social Identity (Optional)</span></div>
          <div class="form-row">
            <div class="form-group">
              <label>Warpcast</label>
              <input type="text" id="in-warpcast" placeholder="@username">
            </div>
            <div class="form-group">
              <label>X / Twitter</label>
              <input type="text" id="in-x" placeholder="@username">
            </div>
          </div>
          <button type="submit" class="submit-btn">🚀 LIST PRODUCT</button>
        </form>
      </section>

      <!-- Favorites View -->
      <section id="view-fav" class="view">
        <div class="view-header">
          <h2>My Favorites</h2>
          <p>Items you've saved for later.</p>
        </div>
        <div class="product-grid" id="fav-list">
          <p class="empty-state">No favorites yet.</p>
        </div>
      </section>

      <!-- Compare View -->
      <section id="view-compare" class="view">
        <div class="view-header">
          <h2>Compare</h2>
          <p>Compare two items side-by-side.</p>
        </div>
        <div id="compare-container">
          <p class="empty-state">Add items to compare.</p>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="window.app.switchView('explore')">🏠<span>Explore</span></button>
      <button class="nav-item" onclick="window.app.switchView('sell')">➕<span>Sell</span></button>
      <button class="nav-item" onclick="window.app.switchView('fav')">🏷️<span>Saved</span></button>
      <button class="nav-item" onclick="window.app.switchView('compare')">⚖️<span>Compare</span></button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
