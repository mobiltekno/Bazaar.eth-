<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bazaar.eth | Farcaster Marketplace</title>
  
  <!-- Farcaster v2 Meta -->
  <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://bazaar-eth.netlify.app/preview.png","button":{"title":"🛍️ Open Bazaar","action":{"type":"launch_frame","name":"Bazaar.eth","url":"https://bazaar-eth.netlify.app","splashImageUrl":"https://bazaar-eth.netlify.app/icon.png","splashBackgroundColor":"#7C3AED"}}}' />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">Bazaar<span>.eth</span></div>
      <div class="user-badge" id="trust-badge">
        <span class="pulse"></span>
        <span id="score-text">FID Score: --</span>
      </div>
    </header>

    <!-- Dynamic Views -->
    <main id="main-content">
      <!-- Explore View -->
      <section id="view-explore" class="view active">
        <section class="hero">
          <h1>Social Commerce on <span>Base</span></h1>
          <p>Buy Knowing Who to Trust.</p>
        </section>
        <nav class="categories">
          <button class="active">All</button>
          <button>Digital</button>
          <button>Services</button>
        </nav>
        <div class="product-grid" id="product-list"></div>
      </section>

      <!-- Sell View -->
      <section id="view-sell" class="view">
        <div class="view-header">
          <h2>Sell Product</h2>
          <p>List your items on the social graph.</p>
        </div>
        <form id="sell-form" class="bazaar-form">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="in-name" placeholder="e.g. Ultra Rare NFT" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Price (ETH/DEGEN)</label>
              <input type="text" id="in-price" placeholder="0.05" required>
            </div>
            <div class="form-group">
              <label>Token</label>
              <select id="in-token">
                <option value="ETH">ETH</option>
                <option value="DEGEN">DEGEN</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="in-img" placeholder="https://..." required>
          </div>
          <div class="form-divider"><span>Social Identity (Optional)</span></div>
          <div class="form-row">
            <div class="form-group">
              <label>Warpcast</label>
              <input type="text" id="in-warpcast" placeholder="@username">
            </div>
            <div class="form-group">
              <label>X / Twitter</label>
              <input type="text" id="in-x" placeholder="@username">
            </div>
          </div>
          <button type="submit" class="submit-btn">🚀 LIST PRODUCT</button>
        </form>
      </section>

      <!-- Favorites View -->
      <section id="view-fav" class="view">
        <div class="view-header">
          <h2>My Favorites</h2>
          <p>Items you've saved for later.</p>
        </div>
        <div class="product-grid" id="fav-list">
          <p class="empty-state">No favorites yet.</p>
        </div>
      </section>

      <!-- Compare View -->
      <section id="view-compare" class="view">
        <div class="view-header">
          <h2>Compare</h2>
          <p>Compare two items side-by-side.</p>
        </div>
        <div id="compare-container">
          <p class="empty-state">Add items to compare.</p>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="window.app.switchView('explore')">🏠<span>Explore</span></button>
      <button class="nav-item" onclick="window.app.switchView('sell')">➕<span>Sell</span></button>
      <button class="nav-item" onclick="window.app.switchView('fav')">🏷️<span>Saved</span></button>
      <button class="nav-item" onclick="window.app.switchView('compare')">⚖️<span>Compare</span></button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
